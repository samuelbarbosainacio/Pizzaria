<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pizzaria Imperadora</title>
    <link rel="stylesheet" href="páginadelogin.css">
</head>
<body>
    <header>
        <h1 class="titulo">Pizzaria Imperadora</h1>
        <img src="Logo.png.png" alt="Logo Pizzaria Imperadora" class="logo2">
    </header>

    <h2 class="texto">Antes de começarmos, precisamos de algumas informações</h2>

    <div class="login">
        <form>
            <label for="nome">Seu Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome aqui" required>

            <label for="email">Seu Email:</label>
            <input type="email" id="email" placeholder="Digite seu email aqui" required>

            <label for="endereco">Seu Endereço:</label>
            <input type="text" id="endereco" placeholder="Digite seu endereço completo" required>
        </form>
<br>
            <h2>Para começar, escolha como vai montar seu pedido</h2>
            <button id="comecar-pedido1" class="Enviar2">Montar detalhadamente</button>
            <button id="comecar-pedido2" class="Enviar2">Montar rapidamente</button>
        
    </div>

    <footer>
        <p>© 2024 Pizzaria Imperadora. Todos os direitos reservados.</p>
    </footer>
    <script>
        const comecarPedido1 = document.getElementById('comecar-pedido1');
        const comecarPedido2 = document.getElementById('comecar-pedido2');

        comecarPedido1.addEventListener('click', function() {
            window.location.href = 'fazendopedido.html';
        });

        comecarPedido2.addEventListener('click', function() {
            window.location.href = 'pedindorapido.html';
        });
    </script>
</body>
</html>
